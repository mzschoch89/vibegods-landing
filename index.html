<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeGods | Custom App Development</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-stripe {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: linear-gradient(
                135deg,
                transparent 0%,
                transparent 40%,
                rgba(180, 130, 60, 0.15) 45%,
                rgba(200, 150, 80, 0.25) 50%,
                rgba(180, 130, 60, 0.15) 55%,
                transparent 60%,
                transparent 100%
            );
            animation: shimmer 8s ease-in-out infinite;
        }

        .gradient-stripe:nth-child(2) {
            background: linear-gradient(
                135deg,
                transparent 0%,
                transparent 55%,
                rgba(100, 80, 50, 0.12) 60%,
                rgba(140, 110, 70, 0.18) 65%,
                rgba(100, 80, 50, 0.12) 70%,
                transparent 75%,
                transparent 100%
            );
            animation-delay: -2s;
        }

        .gradient-stripe:nth-child(3) {
            background: linear-gradient(
                135deg,
                transparent 0%,
                transparent 25%,
                rgba(60, 50, 40, 0.1) 30%,
                rgba(90, 70, 50, 0.15) 35%,
                rgba(60, 50, 40, 0.1) 40%,
                transparent 45%,
                transparent 100%
            );
            animation-delay: -4s;
        }

        @keyframes shimmer {
            0%, 100% {
                transform: translateX(-5%) translateY(-5%);
            }
            50% {
                transform: translateX(5%) translateY(5%);
            }
        }

        /* Content */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        .tagline {
            font-size: 1.125rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3rem;
            max-width: 400px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.4s forwards;
        }

        .services {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 2rem;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.6s forwards;
        }

        .services span {
            font-size: 0.875rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            padding: 0.5rem 0;
            position: relative;
        }

        .services span::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.9s forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            font-size: 0.9375rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 0.75rem 2rem;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .btn-primary:hover {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.05);
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.1em;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1s forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .portfolio {
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.7s forwards;
            text-align: center;
        }

        .portfolio-title {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 1rem;
        }

        .portfolio-apps {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem 1.5rem;
        }

        .app-link {
            font-size: 0.9375rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 0.375rem 0;
            position: relative;
            transition: color 0.2s ease;
        }

        .app-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.2s ease;
        }

        .app-link:hover {
            color: #ffffff;
        }

        .app-link:hover::after {
            background: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 640px) {
            .services {
                flex-direction: column;
                gap: 0.5rem;
            }

            .portfolio-apps {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .cta-group {
                flex-direction: column;
                width: 100%;
                max-width: 280px;
            }

            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient">
        <div class="gradient-stripe"></div>
        <div class="gradient-stripe"></div>
        <div class="gradient-stripe"></div>
    </div>
    
    <div class="container">
        <div class="logo">EST 2025</div>
        
        <h1>vibegods</h1>
        
        <p class="tagline">
            Building apps that feel right.
        </p>
        
        <div class="services">
            <span>Custom App Development</span>
            <span>Monetization Strategy</span>
        </div>

        <div class="portfolio">
            <div class="portfolio-title">Portfolio</div>
            <div class="portfolio-apps">
                <a href="https://apps.apple.com/us/app/peekproof/id6760242402" class="app-link" target="_blank" rel="noopener">PeekProof</a>
                <a href="https://apps.apple.com/us/app/arnold-split/id6759944710" class="app-link" target="_blank" rel="noopener">Arnold Split</a>
                <a href="https://apps.apple.com/us/app/dumpy-y2k-glute-training/id6760607330" class="app-link" target="_blank" rel="noopener">DUMPY Y2K</a>
                <a href="https://apps.apple.com/us/app/frameme-couples-photography/id6760603586" class="app-link" target="_blank" rel="noopener">FrameMe</a>
            </div>
        </div>
        
        <div class="cta-group">
            <a href="mailto:contact@vibegods.app" class="btn btn-primary">
                Get in Touch
            </a>
        </div>
        
        <div class="footer">VIBEGODS.APP</div>
    </div>
</body>
</html>
